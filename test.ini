[DEFAULT]
debug = true

[app:main]
use = egg:ckan
config.mode = testing

ckan.site_id = test
ckan.site_url = http://ckan-test:5000
ckan.storage_path = /tmp/ckan-storage
ckan.plugins =

SECRET_KEY = test-secret-key-for-ckanext-pen
WTF_CSRF_ENABLED = false
WTF_CSRF_SECRET_KEY = test-csrf-secret-key-for-ckanext-pen

sqlalchemy.url = postgresql://ckan:ckan@db/ckan_test
ckan.datastore.write_url = postgresql://ckan:ckan@db/datastore_test
ckan.datastore.read_url = postgresql://datastore_ro:datastore@db/datastore_test
solr_url = http://solr:8983/solr/ckan
ckan.redis.url = redis://redis:6379/1

ckan.auth.create_user_via_web = true
ckan.auth.create_default_api_keys = false
ckan.auth.route_after_login = dashboard.datasets
ckan.auth.user_create_organizations = true
ckan.auth.user_delete_organizations = true
ckan.auth.user_create_groups = true
ckan.auth.user_delete_groups = true

ckanext.pen.idp.client_id = test-client
ckanext.pen.idp.client_secret = test-secret
ckanext.pen.idp.server_metadata_url = https://idp.example.test/.well-known/openid-configuration
ckanext.pen.idp.scope = openid email profile
ckanext.pen.idp.callback = /pen/callback
ckanext.pen.idp.claim_source = id_token
ckanext.pen.idp.name_claim = preferred_username
ckanext.pen.idp.email_claim = email
ckanext.pen.idp.fullname_claim = name
ckanext.pen.idp.groups_claim = groups
ckanext.pen.idp.autogroup = .*
ckanext.pen.idp.autoungroup = .*

[loggers]
keys = root, ckan

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_ckan]
level = INFO
handlers = console
qualname = ckan
propagate = 0

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s

name: E2E

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  docker-compose-e2e:
    name: CKAN OIDC e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build test image
        run: docker compose -f docker-compose.test.yml build ckan-test

      - name: Run e2e tests
        run: docker compose -f docker-compose.test.yml run --rm ckan-test

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.test.yml down --volumes --remove-orphans
